name: OAS MCP Tests

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "oas_mcp/**"
      - "openaerostruct/**"
      - ".github/workflows/mcp-tests.yml"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "oas_mcp/**"
      - "openaerostruct/**"

jobs:
  # -------------------------------------------------------------------------
  # Unit + integration tests (fast, platform-independent)
  # -------------------------------------------------------------------------
  mcp-integration:
    name: MCP Integration Tests
    runs-on: ubuntu-latest

    env:
      # Force deterministic linear algebra
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[mcp]"
          pip install pytest pytest-asyncio anyio

      - name: Run MCP unit and integration tests
        run: |
          pytest oas_mcp/tests/ -v -m "not golden_numerics" \
            --tb=short

  # -------------------------------------------------------------------------
  # Tier 1: Physics invariant golden tests
  # -------------------------------------------------------------------------
  golden-physics:
    name: Golden Physics Invariant Tests
    runs-on: ubuntu-latest
    needs: mcp-integration

    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[mcp]"
          pip install pytest pytest-asyncio anyio

      - name: Run physics invariant golden tests
        run: |
          pytest oas_mcp/tests/golden/test_golden_physics.py -v \
            --tb=short

  # -------------------------------------------------------------------------
  # Tier 2: Numeric baseline golden tests (allowed to fail without blocking)
  # -------------------------------------------------------------------------
  golden-numerics:
    name: Golden Numeric Baseline Tests
    runs-on: ubuntu-latest
    needs: mcp-integration
    # Numeric baselines may shift on different CI runners; don't block PRs
    continue-on-error: true

    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[mcp]"
          pip install pytest pytest-asyncio anyio

      - name: Run numeric baseline golden tests
        run: |
          pytest oas_mcp/tests/golden/test_golden_numerics.py -v \
            --tb=short
        continue-on-error: true

      - name: Upload golden values for inspection on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-values-diff
          path: oas_mcp/tests/golden/golden_values.json
