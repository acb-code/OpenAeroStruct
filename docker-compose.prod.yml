# Production deployment: OAS MCP + Keycloak + Postgres
#
# Replaces Authentik with Keycloak for native DCR support
# (required by Claude Code and claude.ai).
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in secrets
#   2. Caddy reverse proxy with TLS for:
#        - mcp.lakesideai.dev  → keycloak network (oas-mcp:8000)
#        - auth.lakesideai.dev → keycloak network (keycloak:8080)
#
# First-time setup:
#   docker compose -f docker-compose.prod.yml up -d
#   # Then follow oas_mcp/keycloak_setup.md for Keycloak configuration

services:
  # ---------- Shared Postgres ----------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:?Set KC_DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ---------- Keycloak ----------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    command: start --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Admin bootstrap credentials (only used on first start)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # Hostname — Caddy terminates TLS, Keycloak runs plain HTTP behind it
      KC_HOSTNAME: ${KC_HOSTNAME:-auth.lakesideai.dev}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/127.0.0.1/9000 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - internal
      - web

  # ---------- OAS MCP Server ----------
  oas-mcp:
    build:
      context: https://github.com/acb-code/OpenAeroStruct.git#main
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./oas_data:/data
    env_file:
      - path: .env
        required: false
    environment:
      OAS_TRANSPORT: http
      OAS_HOST: 0.0.0.0
      OAS_DATA_DIR: /data
      OAS_PROV_DB: /data/provenance.db
      # Auth — point to Keycloak realm
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://auth.lakesideai.dev/realms/oas}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-oas-mcp}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?Set OIDC_CLIENT_SECRET in .env}
      RESOURCE_SERVER_URL: ${RESOURCE_SERVER_URL:-https://mcp.lakesideai.dev}
    networks:
      - internal
      - web

networks:
  web:
    external: true
  internal:
    driver: bridge

volumes:
  postgres_data:
