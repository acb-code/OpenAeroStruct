services:
  oas-mcp:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - oas-data:/data
    # Load secrets from .env (copy from .env.example and fill in values).
    # Variables set in the environment: block below override whatever is in .env.
    env_file:
      - path: .env
        required: false
    environment:
      # Docker-specific overrides — always use HTTP, bind to all interfaces,
      # and store artifacts in the named volume.
      OAS_TRANSPORT: http
      OAS_HOST: 0.0.0.0
      OAS_DATA_DIR: /data/artifacts

volumes:
  oas-data:
